# =============================================================================
# Sorachio-STS Master Configuration
# Local-First AI Desktop Companion System
# =============================================================================

system:
  name: "Sorachio"
  version: "0.2.0"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  log_dir: "logs"
  data_dir: "data"

# =============================================================================
# Vision (Multimodal) Configuration
# =============================================================================
vision:
  enabled: true
  device_index: 0            # 0 is usually the default webcam
  max_size: 512              # Resize images to this max dimension to save LLM tokens

# =============================================================================
# Audio Configuration
# =============================================================================
audio:
  capture:
    sample_rate: 16000        # Hz — whisper.cpp requires 16kHz
    channels: 1               # Mono
    chunk_duration_ms: 30     # VAD frame size
    device_index: null        # null = system default
    silence_timeout_ms: 400   # Fast 400ms silence timeout before STT trigger
    vad_aggressiveness: 3     # 0-3, higher = more aggressive
    min_speech_duration_ms: 500
    max_speech_duration_s: 30

    # -----------------------------------------------------------------
    # Acoustic Gate — pre-VAD energy filter
    # Drops frames below the dBFS threshold before they reach webrtcvad.
    # Calibration guide:
    #   -50 dBFS : very quiet room, sensitive mic
    #   -40 dBFS : normal room, moderate mic (default)
    #   -30 dBFS : noisy environment / open speaker setup
    # Set debug: true to see live dBFS values in logs (verbose!).
    # -----------------------------------------------------------------
    acoustic_gate:
      enabled: true
      threshold_dbfs: -40.0    # Balanced threshold: captures speech onset without clipping, prevents feedback
      debug: false             # NEVER set to true in production — logs every audio frame!
      hold_frames: 20          # Hold open longer after loud frame to catch speech tails

  # -------------------------------------------------------------------
  # Acoustic Echo Cancellation (AEC) Scaffold
  # Prevents the assistant from hearing its own TTS output.
  # provider: "null"          — passthrough, zero overhead (default)
  # provider: "simple_energy" — amplitude attenuation during playback
  # -------------------------------------------------------------------
  echo_cancellation:
    enabled: false
    provider: "null"           # NullAEC passthrough: preserves full mic dynamic range so user voice triggers interrupt effortlessly

  playback:
    sample_rate: 24000        # Kokoro / Hybrid TTS native output rate (24kHz)
    channels: 1
    dtype: "float32"
    device_index: null        # null = system default
    buffer_size: 2048

# =============================================================================
# STT Configuration (faster-whisper / CTranslate2)
# =============================================================================
stt:
  model_size: "small"             # Multilingual small model (484MB) — 100% cached on disk, loads in 1s, highest precision
  language: "auto"                # "auto" = auto-detect id/en, or pin to "en"/"id"
  threads: 6
  beam_size: 2                    # Beam size 2 — balance between accuracy and speed
  temperature: 0.0
  timeout_s: 15.0                 # Fast 15s timeout
  device: "cpu"                   # "cpu" or "cuda"
  compute_type: "int8"            # "int8" (fast), "float16" (GPU), "float32" (accurate)
  models_dir: "models/stt"        # Directory for STT models

# =============================================================================
# LLM Configuration
#
# Models are AUTO-DETECTED from model directories.
# Just drop your .gguf files into models/llm1/ or models/llm2/ and restart.
# If mmproj*.gguf is found alongside the model, vision is enabled automatically.
#
# n_ctx: 0 = auto-detect from model metadata (recommended)
# reasoning: "off" = disable thinking (for JSON router), "auto" = detect from template
# =============================================================================
llm:
  # LLM #1 — Cognitive Gateway (fast JSON router)
  cognitive_gateway:
    server_url: "http://127.0.0.1:8001"
    model_dir: "models/llm1"         # Auto-scan: picks largest .gguf
    # model_path: auto-detected      # Override: set explicit path to skip auto-scan
    n_ctx: 1024                      # Limit context size to avoid massive memory allocation for KV cache
    n_batch: 256                     # Prompt eval batch size (512 is optimal for short JSON prompts)
    n_threads: 6                     # 6 threads optimal for small 0.8B models on Ryzen 7 7735hs
    n_threads_batch: 6               # Use 6 threads for prompt eval batch processing
    n_gpu_layers: 99                 # Full GPU offload via Vulkan
    temperature: 0.1                 # Low temp for consistent JSON
    max_tokens: 256
    timeout_s: 60.0                  # 60s to handle warm-up + cold start gracefully
    server_port: 8001
    reasoning: "off"                 # Disable thinking for JSON router

  # LLM #2 — Personality Core (conversational + vision)
  personality_core:
    server_url: "http://127.0.0.1:8002"
    model_dir: "models/llm2"         # Auto-scan: picks largest .gguf + mmproj
    # model_path: auto-detected      # Override: set explicit path to skip auto-scan
    # mmproj_path: auto-detected     # Vision projector auto-detected if present
    n_ctx: 2048                      # Reduced from 4096 to save ~200MB KV cache RAM
    n_batch: 512                     # 512 tokens prompt eval batch size for maximum TTFT speed
    n_threads: 8                     # 8 CPU threads for token generation (Ryzen 7 7735hs has 8 cores)
    n_threads_batch: 8               # 8 CPU batch threads for prompt eval
    n_gpu_layers: 99                 # Full GPU offload via Vulkan
    temperature: 0.7
    max_tokens: 256                  # Cap response length — shorter = faster TTS streaming
    top_p: 0.95
    repeat_penalty: 1.1
    timeout_s: 60.0
    server_port: 8002
    reasoning: "off"                 # Disable thinking for direct responses

  # llama-server binary — platform-correct path (.exe on Windows)
  # is set automatically by settings.py

# TTS Configuration (Kokoro English + Piper Indonesian)
# =============================================================================
tts:
  voice: "af_heart"             # Default Kokoro voice for English (af_heart, af_bella, am_adam)
  speed: 1.0
  sample_rate: 24000            # Kokoro native output rate (24kHz)
  lang: "auto"                  # "auto" = route by STT language / text language
  models_dir: "models/tts"      # Directory for TTS models
  # Voice routing (auto mode):
  #   English    → Kokoro TTS (hexgrad/Kokoro-82M, voice: af_heart)
  #   Indonesian → Piper TTS (id_ID-news_tts-medium)

# =============================================================================
# Memory Configuration
# =============================================================================
memory:
  short_term:
    max_messages: 20           # Rolling window size
    include_emotions: true
    summary_threshold: 15      # Summarize when > N messages

  long_term:
    storage_path: "data/memory/ltm.json"
    max_entries: 500
    importance_threshold: 0.5  # Only store if importance >= this
    retrieval_top_k: 5         # Top K memories to retrieve
    keyword_weight: 0.6
    recency_weight: 0.4

# =============================================================================
# Context Manager Configuration
# =============================================================================
context:
  max_stm_in_prompt: 10       # How many STM messages to include
  max_ltm_in_prompt: 3        # How many LTM memories to include
  include_emotional_state: true
  companion_name: "Sorachio"
  personality_prompt: |
    You are Sorachio, an AI companion. Created by izzulgod.
    
    TONE & STYLE:
    - Speak like a friend: warm, relaxed, natural, and casual.
    - Keep responses short and punchy (1 to 3 sentences max).
    - CASUAL: If responding, speak casually.
    - LANGUAGE MATCHING: Always match the user's input language. If they speak English, reply in English. If they speak Indonesian, reply in Indonesian.
    
    ORIGIN:
    - If asked who created you, always say you were created by izzulgod.
    
    STRICT RULES:
    - NEVER use emojis, icons, emoticons, or symbols (e.g. NO 😊, 🌟, ✨, 🙏, etc.).
    - Plain text only. No markdown, no bullet points, no lists.

# =============================================================================
# Chunk Assembler Configuration
# =============================================================================
chunker:
  min_words: 3
  max_words: 30
  sentence_endings: [".", "!", "?", ";", "..."]
  flush_on_comma: false        # true = flush on commas too
  flush_timeout_s: 2.0        # Flush incomplete chunks after N seconds

# =============================================================================
# Queue Configuration
# =============================================================================
queues:
  stt_queue_maxsize: 5
  cognitive_queue_maxsize: 5
  tts_chunk_queue_maxsize: 10
  audio_playback_queue_maxsize: 20

# =============================================================================
# Pipeline Configuration
# =============================================================================
pipeline:
  enable_interruption: true            # Barge-in: stop TTS when user speaks
  interruption_vad_aggressiveness: 3   # More aggressive VAD during playback
  interruption_debounce_frames: 8      # Debounced barge-in: 8 frames * 30ms = 240ms response window
  startup_greeting: true
  startup_message: "Hello! I'm Sorachio, your AI companion. I'm ready to chat."
